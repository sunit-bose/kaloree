name: kaloree
description: Kaloree - AI-Powered Calorie Tracking

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Firebase - Core Services
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_analytics: ^11.3.6
  firebase_remote_config: ^5.2.0
  
  # Google Sign-In
  google_sign_in: ^6.2.2
  
  # AdMob (consent-gated initialization)
  google_mobile_ads: ^5.2.0
  
  # Database - Type-safe SQLite
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Secure Storage - For API keys (uses Android Keystore)
  flutter_secure_storage: ^9.0.0
  
  # Camera - Minimal permissions
  camera: ^0.10.5+7
  
  # ML Kit - On-device food detection
  google_mlkit_image_labeling: ^0.12.0
  
  # Image processing (in-memory only)
  image: ^4.1.4
  
  # HTTP for LLM API calls
  dio: ^5.4.0
  
  # Logging for debugging
  logger: ^2.0.2
  
  # Charts for analytics
  fl_chart: ^0.66.0
  
  # UUID generation
  uuid: ^4.2.2
  
  # Date formatting
  intl: ^0.18.1
  
  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.8

# App Icon Configuration
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/kaloree_app_logo.png"
  adaptive_icon_background: "#2D0B3D"  # Kaloree purple background
  adaptive_icon_foreground: "assets/images/kaloree_app_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/kaloree_app_logo.png"
    background_color: "#2D0B3D"
    theme_color: "#2D0B3D"
  windows:
    generate: true
    image_path: "assets/images/kaloree_app_logo.png"
  macos:
    generate: true
    image_path: "assets/images/kaloree_app_logo.png"

# Native Splash Screen Configuration
flutter_native_splash:
  color: "#2D0B3D"
  image: assets/images/kaloree_logo.png
  color_dark: "#2D0B3D"
  image_dark: assets/images/kaloree_logo.png
  android_12:
    color: "#2D0B3D"
    icon_background_color: "#2D0B3D"
    image: assets/images/kaloree_logo.png
  ios: true
  android: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/data/
    - assets/images/
    - assets/icons/

# Permissions Philosophy:
# - CAMERA: Required for meal photo capture (image never stored)
# - INTERNET: Required for LLM API calls only
# - NO storage permissions (SQLite uses app-private directory)
# - NO location permissions
# - NO contacts/phone/SMS permissions
